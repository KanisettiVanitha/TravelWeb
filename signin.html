<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-image: url("image2.jpg");
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            height: 753px;
        }
        .signin{
            border: 2px solid black;
            padding: 20px;
            text-align: center;
            width:400px;
            height: 250px;
            margin: auto;
            margin-top: 100px;
            font-size: 20px;
            border-radius: 15px;
        }
        input{
            margin-top: 20px;
            font-size: 25px;
            border-radius: 5px;
            text-align: center;
            width: 80%;
        }
        .signin button{
            border-radius: 10px;
            font-size: 20px;
            padding: 5px 10px;
            margin-top: 50px;
            background-color: rgb(9, 109, 142);
        }
        H1{
            COLOR:rgb(181, 42, 70);
            text-align: center;
            font-size: 150PX;
        }
        p{
            top: 0px;
        }
        @media (max-width: 768px) {

  body {
    height: auto;
  }

  h1 {
    font-size: 48px;
    margin-top: 20px;
  }

  .signin {
    width: 90%;
    height: auto;
    margin-top: 40px;
    font-size: 18px;
  }

  input {
    font-size: 18px;
  }

  .signin button {
    font-size: 18px;
    margin-top: 20px;
  }
}

        
    </style>
</head>

<body>

</body>
</html>
